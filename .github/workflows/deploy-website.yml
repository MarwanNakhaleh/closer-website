name: Deploy Website to GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - '**'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify-blog:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for diff

      - name: Detect new blog posts
        id: detect
        run: |
          # Find new HTML files added to blog/ in this commit
          NEW_POSTS=$(git diff --name-only --diff-filter=A HEAD~1 HEAD -- 'blog/*.html' | grep -v 'index.html' || true)
          if [ -z "$NEW_POSTS" ]; then
            echo "No new blog posts detected"
            echo "has_new_posts=false" >> "$GITHUB_OUTPUT"
          else
            echo "New blog posts found:"
            echo "$NEW_POSTS"
            echo "has_new_posts=true" >> "$GITHUB_OUTPUT"
            echo "new_posts<<EOF" >> "$GITHUB_OUTPUT"
            echo "$NEW_POSTS" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.detect.outputs.has_new_posts == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install firebase-admin
        if: steps.detect.outputs.has_new_posts == 'true'
        run: npm install firebase-admin

      - name: Notify new blog posts
        if: steps.detect.outputs.has_new_posts == 'true'
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "${{ steps.detect.outputs.new_posts }}" | while IFS= read -r file; do
            [ -z "$file" ] && continue
            # Extract title from HTML <title> tag, strip " - Closer" suffix
            TITLE=$(grep -o '<title>[^<]*</title>' "$file" | sed 's/<[^>]*>//g' | sed 's/ - Closer$//')
            # Build URL from filename: 20260305-slug.html -> /blog/20260305-slug.html
            URL="https://closerconnectandalign.com/$file"
            echo "Notifying: $TITLE -> $URL"
            node .github/scripts/notify-blog-post.js --title "$TITLE" --url "$URL"
          done
